services:
  # ─── Caddy (Reverse Proxy + HTTPS automático) ───
  caddy:
    image: caddy:2-alpine
    container_name: usinasoft_caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - SSL_EMAIL=${SSL_EMAIL}
    depends_on:
      - frontend
    networks:
      - usinasoft_network
    restart: unless-stopped

  # ─── Banco de Dados ───
  db:
    image: postgres:15-alpine
    container_name: usinasoft_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - usinasoft_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Backend (FastAPI) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: usinasoft_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=["https://${DOMAIN}","http://${DOMAIN}"]
      - DEBUG=${DEBUG:-false}
      - EMPRESA_CNPJ=${EMPRESA_CNPJ}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - usinasoft_network
    restart: unless-stopped

  # ─── Frontend (Nginx + React) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: usinasoft_frontend
    depends_on:
      - backend
    networks:
      - usinasoft_network
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  usinasoft_network:
    driver: bridge
