services:
  db:
    image: postgres:15-alpine
    container_name: usinasoft_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usinasoft
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - usinasoft_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: usinasoft_backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/usinasoft
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-a-strong-random-key}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173","http://localhost","https://${DOMAIN:-localhost}"]
      - DEBUG=${DEBUG:-true}
      - EMPRESA_CNPJ=${EMPRESA_CNPJ:-53428953000111}
    # Porta exposta apenas na rede interna Docker (frontend faz proxy via Nginx)
    # Não mapeia porta externa para evitar conflito com Airbyte na 8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - usinasoft_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: usinasoft_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - usinasoft_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  usinasoft_network:
    driver: bridge
